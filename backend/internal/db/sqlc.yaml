version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations/*.up.sql"
    queries: "queries/*.sql"
    gen:
      go:
        package: "db"
        out: "."
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
